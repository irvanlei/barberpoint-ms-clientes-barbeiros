spring.application.name=barberpoint-ms-clientes-barbeiros
server.port=8082
server.servlet.context-path=/api

# SQL Server Configuration (Docker)
spring.datasource.url=jdbc:sqlserver://sqlserver:1433;databaseName=barberpoint_users;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=YourPassword123!
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Logging
logging.level.root=INFO
logging.level.com.barberpoint=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

# API Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method